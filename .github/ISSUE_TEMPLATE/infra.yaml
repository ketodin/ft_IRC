name: Infra
description: CI, Makefile, tooling, GitHub configuration or other infrastructure work.
title: "[INFRA] <short title>"
labels: ["infra"]
body:
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What part of the infrastructure is this about?
      placeholder: e.g. Add GitHub Actions workflow for cppcheck
    validations:
      required: true

  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What is the expected outcome?
      placeholder: e.g. Every PR runs cppcheck and fails on any finding
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] CI runs on every pull request to main
        - [ ] CI fails on error
        - [ ] Documentation is updated if needed
