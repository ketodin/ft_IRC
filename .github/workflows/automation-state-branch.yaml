# ─────────────────────────────────────────────────────────────────────────────
# automation-state-branch.yaml
#
# Sets state:in-progress on the issue linked to a newly created branch.
# Branch must follow the convention: type/<issue>[-description]
# e.g. feat/42-join-command
#
# Triggers : create — branch ref type only (tags filtered by job condition)
# Script   : .github/scripts/automation-state-branch.js
# ─────────────────────────────────────────────────────────────────────────────

name: "Automation — Branch State"

on:
  create:

concurrency:
  group: automation-state-branch-${{ github.ref }}
  cancel-in-progress: false

jobs:
  state-branch:
    name: "Set state:in-progress on issue linked to branch"
    if: github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Set state:in-progress on issue linked to new branch"
        uses: actions/github-script@v7
        with:
          script: |
            const fn = require('./.github/scripts/automation-state-branch.js');
            await fn({ github, context });
